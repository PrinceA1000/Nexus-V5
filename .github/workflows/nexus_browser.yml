name: Crown Nexus Browser Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crown-browser:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: |
         npm install puppeteer puppeteer-extra puppeteer-extra-plugin-proxy chalk cli-progress dotenv
          

      - name: Generate proxy list from env
        run: |
          echo "${{ secrets.PROXY_LIST }}" > proxies.txt
          echo "✅ Proxy list generated."

      - name: Run Crown Nexus Engine
        id: nexus-run
        run: |
          node nexus_engine.js "${{ secrets.TARGET_URL }}" "proxies.txt" 2>&1 | tee nexus_output.log
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "status=✅ Success" >> $GITHUB_ENV
            echo "exit_code=0" >> $GITHUB_ENV
          else
            echo "status=❌ Failure" >> $GITHUB_ENV
            echo "exit_code=1" >> $GITHUB_ENV
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crown-nexus-artifacts
          path: |
            crown-nexus-screenshot.png
            nexus_output.log

      - name: Commit status (optional)
        if: always()
        run: |
          echo "Crown Nexus run status: ${{ env.status || '⚠️ Unknown (previous step failed)' }}"
          if [ "${{ env.exit_code }}" = "0" ]; then
            echo "✅ Workflow succeeded"
          else
            echo "❌ Workflow failed - check logs for details"
            exit 1
          fi