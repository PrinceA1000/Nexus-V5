name: Crown Nexus Browser Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  crown-browser:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/puppeteer/puppeteer:latest
      env:
        PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 for actions

    steps:
      - name: Checkout
        uses: actions/checkout@v5  # Updated to Node.js 24 compatible version

      - name: Setup Node.js
        uses: actions/setup-node@v5  # Updated for Node.js 24
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate proxy list from env
        run: |
          echo "${{ secrets.PROXY_LIST }}" > proxies.txt
          echo "✅ Proxy list generated."

      - name: Run Crown Nexus Engine
        id: nexus-run
        run: |
          node nexus_engine.js "${{ secrets.TARGET_URL }}" "proxies.txt" 2>&1 | tee nexus_output.log
          # Capture status for later steps using environment file
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "status=✅ Success" >> $GITHUB_ENV
            echo "exit_code=0" >> $GITHUB_ENV
          else
            echo "status=❌ Failure" >> $GITHUB_ENV
            echo "exit_code=1" >> $GITHUB_ENV
          fi

      - name: Upload artifacts (screenshots, logs)
        uses: actions/upload-artifact@v4  # Kept as v4 (Node.js 20 compatible actions will be updated by runner)
        with:
          name: crown-nexus-artifacts
          path: |
            crown-nexus-screenshot.png
            nexus_output.log

      - name: Commit status (optional)
        if: always()
        run: |
          echo "Crown Nexus run status: ${{ env.status }}"
          exit ${{ env.exit_code }}