<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crown Browser</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ==============================
       RESET & VARIABLES
    ============================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #06060f;
      --bg2:      #0c0c1e;
      --panel:    rgba(12,12,30,0.97);
      --border:   rgba(0,240,210,0.1);
      --bh:       rgba(0,240,210,0.35);
      --cyan:     #00f0d2;
      --purple:   #7c3aed;
      --pink:     #f72585;
      --green:    #06d6a0;
      --red:      #ef4444;
      --text:     #dde8f0;
      --dim:      rgba(221,232,240,0.4);
      --muted:    rgba(221,232,240,0.2);
      --glow:     0 0 20px rgba(0,240,210,0.25);
      --topH:     46px;
      --tabH:     34px;
      --r:        7px;
    }
    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ==============================
       BOOT
    ============================== */
    #boot {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
    }
    #boot.out { animation: bootOut 0.45s forwards; }
    @keyframes bootOut { to { opacity: 0; pointer-events: none; } }

    .b-logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2.6rem; font-weight: 700; letter-spacing: 8px;
      color: var(--cyan);
      text-shadow: 0 0 30px var(--cyan), 0 0 70px rgba(0,240,210,0.25);
      animation: logoGlow 1.8s ease-in-out infinite;
    }
    @keyframes logoGlow {
      0%,100% { text-shadow: 0 0 20px var(--cyan), 0 0 50px rgba(0,240,210,0.2); }
      50%      { text-shadow: 0 0 50px var(--cyan), 0 0 100px rgba(0,240,210,0.35); }
    }
    .b-sub { font-size: 0.65rem; letter-spacing: 3px; color: var(--dim); margin-bottom: 22px; }
    .b-track { width: 160px; height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; overflow: hidden; }
    .b-fill  { height: 100%; width: 0; background: linear-gradient(90deg, var(--cyan), var(--purple)); border-radius: 1px; transition: width 0.75s cubic-bezier(.4,0,.2,1); }

    /* ==============================
       APP SHELL
    ============================== */
    #app { position: fixed; inset: 0; display: none; flex-direction: column; }
    #app.on { display: flex; }

    /* ==============================
       TOP BAR
    ============================== */
    #topbar {
      height: var(--topH); flex-shrink: 0;
      display: flex; align-items: center; gap: 5px; padding: 0 8px;
      background: var(--panel); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(24px); position: relative; z-index: 200;
    }
    #topbar::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
    }

    .logo {
      font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: 700;
      letter-spacing: 3px; color: var(--cyan);
      text-shadow: 0 0 10px rgba(0,240,210,0.4);
      flex-shrink: 0; padding-right: 2px;
    }
    .sep { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }

    .ico {
      width: 30px; height: 30px; flex-shrink: 0;
      display: grid; place-items: center;
      background: transparent; border: 1px solid transparent; border-radius: var(--r);
      color: var(--dim); cursor: pointer; font-size: 14px;
      transition: all .15s;
    }
    .ico:hover:not(:disabled) { background: rgba(0,240,210,0.07); border-color: var(--bh); color: var(--cyan); }
    .ico:disabled { opacity: .22; cursor: not-allowed; }

    .addr { flex: 1; position: relative; min-width: 0; }
    #url {
      width: 100%; height: 31px; padding: 0 32px 0 11px;
      background: rgba(0,0,0,0.38); border: 1px solid var(--border); border-radius: var(--r);
      color: var(--cyan); font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    #url:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(0,240,210,0.1); }
    #url::placeholder { color: var(--muted); }
    .addr-ic { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 11px; pointer-events: none; }

    .rgroup { display: flex; gap: 3px; flex-shrink: 0; align-items: center; }

    .pbtn {
      height: 27px; padding: 0 9px;
      display: flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 6px;
      color: var(--dim); cursor: pointer; font-size: 10.5px; font-weight: 700; letter-spacing: .5px;
      transition: all .2s; flex-shrink: 0;
    }
    .pbtn.on { background: rgba(0,240,210,0.09); border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 10px rgba(0,240,210,0.12); }
    .pdot { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); transition: .2s; }
    .pbtn.on .pdot { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }

    /* ==============================
       TAB BAR
    ============================== */
    #tabs {
      height: var(--tabH); flex-shrink: 0;
      display: flex; align-items: center; gap: 3px; padding: 0 8px;
      background: rgba(6,6,15,0.85); border-bottom: 1px solid var(--border);
      overflow-x: auto; overflow-y: hidden;
    }
    #tabs::-webkit-scrollbar { height: 2px; }
    #tabs::-webkit-scrollbar-thumb { background: var(--border); }

    .tab {
      height: 25px; min-width: 75px; max-width: 155px;
      display: flex; align-items: center; gap: 5px; padding: 0 7px 0 9px;
      background: rgba(255,255,255,0.02); border: 1px solid transparent; border-radius: 5px;
      cursor: pointer; font-size: 11px; font-weight: 600; color: var(--dim);
      transition: all .13s; flex-shrink: 0; user-select: none;
    }
    .tab:hover:not(.act) { background: rgba(0,240,210,0.04); color: var(--text); }
    .tab.act { background: rgba(0,240,210,0.09); border-color: rgba(0,240,210,0.28); color: var(--cyan); }
    .tab-lbl { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .tab-x { width: 13px; height: 13px; display: grid; place-items: center; border-radius: 3px; font-size: 9px; color: var(--dim); flex-shrink: 0; transition: .1s; }
    .tab-x:hover { background: rgba(239,68,68,0.2); color: var(--red); }

    .newtab {
      width: 23px; height: 23px; flex-shrink: 0;
      display: grid; place-items: center;
      background: transparent; border: 1px solid var(--border); border-radius: 5px;
      color: var(--dim); cursor: pointer; font-size: 15px;
      transition: all .13s;
    }
    .newtab:hover { background: rgba(0,240,210,0.07); color: var(--cyan); border-color: var(--bh); }

    /* ==============================
       VIEWPORT
    ============================== */
    #vp { flex: 1; position: relative; background: #000; overflow: hidden; }
    #frame {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    }

    /* ==============================
       OVERLAYS
    ============================== */
    .ov {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 28px;
      transition: opacity .2s;
    }
    .ov.hide { opacity: 0; pointer-events: none; }

    #ov-home {
      background: var(--bg);
      background-image:
        linear-gradient(rgba(0,240,210,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,210,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    .h-logo {
      font-family: 'Rajdhani', sans-serif; font-size: 3.2rem; font-weight: 700;
      letter-spacing: 8px; color: var(--cyan);
      text-shadow: 0 0 40px rgba(0,240,210,0.35);
    }
    .h-sub { font-size: 0.65rem; letter-spacing: 3px; color: var(--dim); margin-bottom: 28px; }
    .h-row { display: flex; gap: 7px; width: min(480px, 90%); margin-bottom: 28px; }
    .h-input {
      flex: 1; height: 42px; padding: 0 15px;
      background: rgba(0,0,0,0.45); border: 1px solid var(--border); border-radius: var(--r);
      color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .h-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(0,240,210,0.1); }
    .h-input::placeholder { color: var(--muted); }
    .h-go {
      height: 42px; padding: 0 18px; border: none; border-radius: var(--r);
      background: var(--cyan); color: #000; font-weight: 700; font-size: 13px;
      cursor: pointer; transition: filter .15s;
    }
    .h-go:hover { filter: brightness(1.1); }

    .quickgrid {
      display: grid; grid-template-columns: repeat(4, 82px); gap: 10px;
    }
    .qtile {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 13px 8px;
      background: rgba(255,255,255,0.025); border: 1px solid var(--border); border-radius: 10px;
      cursor: pointer; font-size: 11px; color: var(--dim); transition: all .18s;
    }
    .qtile:hover { border-color: var(--cyan); background: rgba(0,240,210,0.055); color: var(--cyan); transform: translateY(-2px); }
    .qtile .qi { font-size: 21px; }

    #ov-load { background: var(--bg); }
    .spin {
      width: 38px; height: 38px; margin-bottom: 14px;
      border: 2px solid rgba(0,240,210,0.13); border-top-color: var(--cyan);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .l-title { font-size: 14px; font-weight: 700; color: var(--cyan); margin-bottom: 5px; }
    .l-sub   { font-size: 11.5px; color: var(--dim); max-width: 300px; }

    #ov-err { background: var(--bg); }
    .e-ico  { font-size: 38px; margin-bottom: 12px; }
    .e-ttl  { font-size: 16px; font-weight: 700; color: var(--red); margin-bottom: 6px; }
    .e-msg  { font-size: 12px; color: var(--dim); max-width: 340px; line-height: 1.55; margin-bottom: 18px; }
    .e-row  { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    .btn {
      height: 34px; padding: 0 15px; border-radius: var(--r); border: none;
      font-size: 12px; font-weight: 700; cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px; transition: all .15s;
    }
    .btn-c { background: var(--cyan); color: #000; }
    .btn-c:hover { filter: brightness(1.1); }
    .btn-g { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); }
    .btn-g:hover { border-color: var(--bh); background: rgba(0,240,210,0.06); }

    /* ==============================
       SIDEBAR
    ============================== */
    #sidebar {
      position: absolute; top: 0; right: 0; bottom: 0; width: 265px;
      background: var(--panel); border-left: 1px solid var(--border);
      backdrop-filter: blur(24px);
      transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
      z-index: 100; display: flex; flex-direction: column;
    }
    #sidebar.open { transform: translateX(0); }

    .sb-hdr {
      display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; position: relative; padding-top: 2px;
    }
    .sb-tab {
      flex: 1; height: 40px; display: grid; place-items: center;
      font-size: 10.5px; font-weight: 700; letter-spacing: .5px;
      color: var(--dim); cursor: pointer; border: none; background: none;
      transition: color .15s; border-bottom: 2px solid transparent;
    }
    .sb-tab:hover { color: var(--text); }
    .sb-tab.act { color: var(--cyan); border-bottom-color: var(--cyan); }
    .sb-x {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 22px; height: 22px; display: grid; place-items: center;
      background: none; border: none; color: var(--dim); cursor: pointer;
      font-size: 14px; border-radius: 4px; transition: .13s;
    }
    .sb-x:hover { background: rgba(239,68,68,0.15); color: var(--red); }

    .sb-pane { flex: 1; overflow-y: auto; padding: 10px; display: none; }
    .sb-pane.act { display: block; }
    .sb-pane::-webkit-scrollbar { width: 3px; }
    .sb-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sb-add {
      display: block; width: 100%; height: 32px; margin-bottom: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--r);
      color: var(--dim); font-size: 11px; font-weight: 700; cursor: pointer;
      transition: all .15s; letter-spacing: .5px;
    }
    .sb-add:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,240,210,0.06); }

    .si {
      padding: 9px 10px; margin-bottom: 5px;
      background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: var(--r);
      transition: all .13s; cursor: pointer;
    }
    .si:hover { border-color: var(--bh); background: rgba(0,240,210,0.045); }
    .si-ttl { font-size: 11.5px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .si-url { font-size: 10px; color: var(--dim); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: 'JetBrains Mono', monospace; }
    .si-row { display: flex; gap: 4px; margin-top: 6px; }
    .sm {
      height: 20px; padding: 0 7px; font-size: 10px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 4px;
      color: var(--dim); cursor: pointer; transition: .1s;
    }
    .sm:hover { background: var(--cyan); color: #000; border-color: transparent; }
    .empty { text-align: center; padding: 30px 16px; color: var(--dim); font-size: 12px; }

    /* ==============================
       TOAST
    ============================== */
    #toast {
      position: fixed; bottom: 14px; left: 50%;
      transform: translateX(-50%) translateY(50px);
      background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 16px; font-size: 12px; font-weight: 600;
      opacity: 0; transition: all .22s; z-index: 9999;
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.ok   { border-color: var(--green); color: var(--green); }
    #toast.err  { border-color: var(--red); color: var(--red); }
    #toast.inf  { border-color: var(--cyan); color: var(--cyan); }

    /* ==============================
       RESPONSIVE
    ============================== */
    @media (max-width: 580px) {
      .logo, .sep { display: none; }
      #sidebar { width: 100%; }
      .quickgrid { grid-template-columns: repeat(3, 76px); }
      .pbtn span { display: none; }
    }
  </style>
</head>
<body>

<!-- ===== BOOT ===== -->
<div id="boot">
  <div class="b-logo">CROWN</div>
  <div class="b-sub">BROWSER · v3.1 · Fixed</div>
  <div class="b-track"><div class="b-fill" id="bfill"></div></div>
</div>

<!-- ===== APP ===== -->
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <span class="logo">⬡ CROWN</span>
    <div class="sep"></div>
    <button class="ico" id="btn-back" disabled title="Back">&#8592;</button>
    <button class="ico" id="btn-fwd"  disabled title="Forward">&#8594;</button>
    <button class="ico" id="btn-rl"          title="Reload">&#8635;</button>
    <button class="ico" id="btn-home"        title="Home">⌂</button>

    <div class="addr">
      <input id="url" type="text" placeholder="Search or enter URL…" spellcheck="false" autocomplete="off">
      <span class="addr-ic">🔍</span>
    </div>

    <div class="rgroup">
      <button class="pbtn on" id="btn-proxy" title="Toggle Proxy">
        <div class="pdot"></div><span>PROXY</span>
      </button>
      <button class="ico" id="btn-theater" title="Theater Mode (F11)">⛶</button>
      <button class="ico" id="btn-bm"      title="Bookmark Page">♡</button>
      <button class="ico" id="btn-cloak"   title="Cloak (about:blank)">🎭</button>
      <button class="ico" id="btn-sb"      title="History & Bookmarks">☰</button>
    </div>
  </div>

  <!-- TAB BAR -->
  <div id="tabs">
    <button class="newtab" id="btn-newtab" title="New Tab">+</button>
  </div>

  <!-- VIEWPORT -->
  <div id="vp">
    <iframe id="frame"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-pointer-lock allow-downloads"
      allow="autoplay; fullscreen; picture-in-picture; clipboard-write"
      allowfullscreen>
    </iframe>

    <!-- HOME -->
    <div class="ov" id="ov-home">
      <div class="h-logo">CROWN</div>
      <div class="h-sub">YOUR BROWSER · YOUR RULES</div>
      <div class="h-row">
        <input class="h-input" id="h-url" placeholder="Search Google or enter a URL…">
        <button class="h-go" id="h-go">Go</button>
      </div>
      <div class="quickgrid">
        <div class="qtile" data-url="https://youtube.com">        <span class="qi">▶️</span>YouTube</div>
        <div class="qtile" data-url="https://www.google.com">     <span class="qi">🔍</span>Google</div>
        <div class="qtile" data-url="https://wikipedia.org">      <span class="qi">📖</span>Wiki</div>
        <div class="qtile" data-url="https://github.com">         <span class="qi">🐙</span>GitHub</div>
        <div class="qtile" data-url="https://twitch.tv">          <span class="qi">🎮</span>Twitch</div>
        <div class="qtile" data-url="https://reddit.com">         <span class="qi">🤖</span>Reddit</div>
        <div class="qtile" data-url="https://discord.com/app">    <span class="qi">💬</span>Discord</div>
        <div class="qtile" data-url="https://open.spotify.com">   <span class="qi">🎵</span>Spotify</div>
      </div>
    </div>

    <!-- LOADING -->
    <div class="ov hide" id="ov-load">
      <div class="spin"></div>
      <div class="l-title">Loading</div>
      <div class="l-sub" id="l-sub">Connecting…</div>
    </div>

    <!-- ERROR -->
    <div class="ov hide" id="ov-err">
      <div class="e-ico">⚠</div>
      <div class="e-ttl">Page Unavailable</div>
      <div class="e-msg" id="e-msg">This page couldn't be loaded.</div>
      <div class="e-row">
        <button class="btn btn-c" id="btn-retry">↺ Retry with Proxy</button>
        <button class="btn btn-g" id="btn-ext">↗ Open in New Tab</button>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-hdr">
      <button class="sb-tab act" data-p="hist">HISTORY</button>
      <button class="sb-tab"     data-p="bm">BOOKMARKS</button>
      <button class="sb-x" id="sb-close">✕</button>
    </div>
    <div class="sb-pane act" id="pane-hist"></div>
    <div class="sb-pane"     id="pane-bm">
      <button class="sb-add" id="do-bm">+ Bookmark This Page</button>
      <div id="bm-list"></div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
(function () {
  'use strict';

  /* =============================================
     CONFIG
  ============================================= */
  const PROXIES = [
    u => `https://api.allorigins.win/raw?url=${enc(u)}`,
    u => `https://corsproxy.io/?${enc(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${enc(u)}`,
    u => `https://thingproxy.freeboard.io/fetch/${enc(u)}`,
    u => `https://proxy.crown-browser.dev/fetch?url=${enc(u)}` // Fallback custom proxy
  ];

  const INVIDIOUS = [
    'https://invidious.kavin.rocks',
    'https://yewtu.be',
    'https://inv.riverside.rocks',
    'https://invidious.snopyta.org'
  ];

  const TIMEOUT = 13000;

  /* =============================================
     STATE
  ============================================= */
  let tabs = [mk(1, 'New Tab', '')];
  let tid  = 2;
  let act  = 1;
  let busy = false;
  let proxyOn = true;
  let theater = false;
  let blobUrl = null;
  let keepAliveTimer = null;

  let hist = [];
  let bms  = [];
  try { hist = JSON.parse(localStorage.getItem('cr_hist') || '[]'); } catch {}
  try { bms  = JSON.parse(localStorage.getItem('cr_bm')   || '[]'); } catch {}

  /* =============================================
     ELEMENTS
  ============================================= */
  const $ = id => document.getElementById(id);
  const frame   = $('frame');
  const urlBar  = $('url');
  const ovHome  = $('ov-home');
  const ovLoad  = $('ov-load');
  const lSub    = $('l-sub');
  const ovErr   = $('ov-err');
  const eMsg    = $('e-msg');
  const toastEl = $('toast');
  const tabsEl  = $('tabs');
  const sidebar = $('sidebar');

  /* =============================================
     BOOT
  ============================================= */
  requestAnimationFrame(() => { $('bfill').style.width = '100%'; });
  setTimeout(() => {
    $('boot').classList.add('out');
    setTimeout(() => {
      $('boot').style.display = 'none';
      $('app').classList.add('on');
      renderTabs();
      showHome();
      registerSW();
    }, 450);
  }, 1050);

  /* =============================================
     SERVICE WORKER REGISTRATION
  ============================================= */
  function registerSW() {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js', { scope: './' })
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
    }
  }

  /* =============================================
     UTILS
  ============================================= */
  function enc(u) { return encodeURIComponent(u); }
  function mk(id, title, url) { return { id, title, url, stack: [], si: -1 }; }
  function cur() { return tabs.find(t => t.id === act); }
  function host(u) {
    try { return new URL(u).hostname.replace(/^www\./, ''); }
    catch { return u.slice(0, 30); }
  }
  function norm(raw) {
    raw = raw.trim();
    if (!raw) return '';
    if (/^https?:\/\//i.test(raw)) return raw;
    if (/^[a-z0-9-]+(\.[a-z]{2,})+/i.test(raw) && !raw.includes(' '))
      return 'https://' + raw;
    return `https://www.google.com/search?q=${enc(raw)}`;
  }
  function isYT(u) { return /youtube\.com|youtu\.be/i.test(u); }
  function ytEmbed(u) {
    const m = u.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);
    if (m) return `https://www.youtube.com/embed/${m[1]}?autoplay=1&rel=0&modestbranding=1&enablejsapi=1`;
    return INVIDIOUS[0] + '/';
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escA(s) {
    return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');
  }

  /* =============================================
     TABS
  ============================================= */
  function renderTabs() {
    tabsEl.querySelectorAll('.tab').forEach(el => el.remove());
    tabs.forEach(t => {
      const el = document.createElement('div');
      el.className = 'tab' + (t.id === act ? ' act' : '');
      el.dataset.id = t.id;
      el.innerHTML = `<span class="tab-lbl">${esc(t.title)}</span><span class="tab-x" data-x="${t.id}">✕</span>`;
      el.addEventListener('click', e => {
        const x = e.target.dataset.x;
        if (x) { closeTab(+x); return; }
        switchTab(t.id);
      });
      tabsEl.insertBefore(el, $('btn-newtab'));
    });
  }
  function newTab(url) {
    const t = mk(tid++, 'New Tab', url || '');
    tabs.push(t);
    act = t.id;
    renderTabs();
    if (url) nav(url);
    else { showHome(); urlBar.value = ''; }
    navBtns();
  }
  function switchTab(id) {
    const t = tabs.find(x => x.id === id);
    if (!t) return;
    act = id;
    renderTabs();
    if (t.url) nav(t.url, false);
    else { showHome(); urlBar.value = ''; }
    navBtns();
  }
  function closeTab(id) {
    if (tabs.length === 1) { newTab(); }
    tabs = tabs.filter(t => t.id !== id);
    if (act === id) {
      act = tabs[tabs.length - 1].id;
      const t = cur();
      if (t.url) nav(t.url, false);
      else showHome();
    }
    renderTabs();
  }
  $('btn-newtab').onclick = () => newTab();

  /* =============================================
     NAVIGATION
  ============================================= */
  async function nav(input, push = true) {
    const url = norm(input);
    if (!url) return;
    const t = cur();
    t.url   = url;
    t.title = host(url);
    urlBar.value = url;
    if (push && (t.si < 0 || t.stack[t.si] !== url)) {
      t.stack = t.stack.slice(0, t.si + 1);
      t.stack.push(url);
      t.si = t.stack.length - 1;
    }
    navBtns();
    renderTabs();
    addHist(url);
    await load(url);
  }
  window.nav = nav;

  /* =============================================
     LOAD
  ============================================= */
  async function load(url) {
    busy = true;
    showLoad(`Connecting to ${host(url)}…`);
    if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
    clearInterval(keepAliveTimer);
    frame.src = 'about:blank';

    try {
      if (isYT(url)) {
        await loadYouTube(url);
      } else if (!proxyOn) {
        await direct(url);
      } else {
        await withProxy(url);
      }
    } catch (e) {
      console.warn('Load error:', e.message);
      showErr(e.message || 'Page failed to load.');
    } finally {
      busy = false;
    }
  }

  async function loadYouTube(url) {
    const embedUrl = ytEmbed(url);
    // Keep-alive for YouTube embeds
    await direct(embedUrl);
    keepAliveTimer = setInterval(() => {
      try {
        if (frame.contentWindow && frame.contentWindow.location.href === 'about:blank') {
          frame.src = embedUrl;
        }
      } catch (e) {}
    }, 4000);
  }

  function direct(url) {
    return new Promise((resolve, reject) => {
      const t = setTimeout(() => reject(new Error('Connection timed out.')), TIMEOUT);
      frame.onload  = () => { clearTimeout(t); hideOvs(); resolve(); };
      frame.onerror = () => { clearTimeout(t); reject(new Error('Connection failed.')); };
      frame.src = url;
    });
  }

  async function withProxy(url) {
    for (let i = 0; i < PROXIES.length; i++) {
      lSub.textContent = `Trying proxy ${i + 1} of ${PROXIES.length}…`;
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 9500);
      try {
        const res = await fetch(PROXIES[i](url), {
          signal: ctrl.signal,
          headers: { Accept: 'text/html,application/xhtml+xml,*/*' }
        });
        clearTimeout(t);
        if (!res.ok) continue;
        const raw = await res.text();
        const blob = new Blob([patchHtml(raw, url)], { type: 'text/html;charset=utf-8' });
        blobUrl = URL.createObjectURL(blob);
        await direct(blobUrl);
        return;
      } catch {
        clearTimeout(t);
        if (i === PROXIES.length - 1)
          throw new Error(`All ${PROXIES.length} proxies failed. Try toggling Proxy OFF or open externally.`);
      }
    }
  }

  function patchHtml(html, base) {
    html = html.replace(/<meta[^>]+(X-Frame-Options|Content-Security-Policy|x-frame-options|content-security-policy)[^>]*>/gi, '');
    const baseTag = `<base href="${base}">`;
    if (/<head[\s>]/i.test(html)) {
      html = html.replace(/<head[\s>][^>]*>/i, m => m + baseTag);
    } else {
      html = baseTag + html;
    }
    try {
      const proto = new URL(base).protocol;
      html = html.replace(/(src|href|action)=["']\/\//g, `$1="${proto}//`);
    } catch {}
    return html;
  }

  /* =============================================
     OVERLAY MANAGEMENT
  ============================================= */
  function showHome()    { frame.src = 'about:blank'; ovHome.classList.remove('hide'); ovLoad.classList.add('hide'); ovErr.classList.add('hide'); }
  function showLoad(msg) { lSub.textContent = msg; ovHome.classList.add('hide'); ovLoad.classList.remove('hide'); ovErr.classList.add('hide'); }
  function showErr(msg)  { eMsg.textContent = msg; ovHome.classList.add('hide'); ovLoad.classList.add('hide'); ovErr.classList.remove('hide'); }
  function hideOvs()     { ovHome.classList.add('hide'); ovLoad.classList.add('hide'); ovErr.classList.add('hide'); }

  /* =============================================
     NAV BUTTONS
  ============================================= */
  function navBtns() {
    const t = cur();
    $('btn-back').disabled = t.si <= 0;
    $('btn-fwd').disabled  = t.si >= t.stack.length - 1;
  }
  $('btn-back').onclick = () => { const t = cur(); if (t.si > 0) { t.si--; nav(t.stack[t.si], false); } };
  $('btn-fwd').onclick  = () => { const t = cur(); if (t.si < t.stack.length - 1) { t.si++; nav(t.stack[t.si], false); } };
  $('btn-rl').onclick   = () => { const t = cur(); if (t.url) load(t.url); };
  $('btn-home').onclick = () => { const t = cur(); t.url = ''; t.title = 'New Tab'; renderTabs(); urlBar.value = ''; showHome(); };
  urlBar.addEventListener('keydown', e => { if (e.key === 'Enter') nav(urlBar.value); });

  /* =============================================
     HOME SCREEN
  ============================================= */
  $('h-go').onclick = () => nav($('h-url').value);
  $('h-url').addEventListener('keydown', e => { if (e.key === 'Enter') nav($('h-url').value); });
  document.querySelectorAll('.qtile').forEach(el => {
    el.onclick = () => nav(el.dataset.url);
  });

  /* =============================================
     PROXY TOGGLE
  ============================================= */
  $('btn-proxy').onclick = () => {
    proxyOn = !proxyOn;
    $('btn-proxy').classList.toggle('on', proxyOn);
    toast(proxyOn ? 'Proxy ON' : 'Proxy OFF', proxyOn ? 'ok' : 'inf');
    const t = cur();
    if (t.url) load(t.url);
  };

  /* =============================================
     THEATER MODE
  ============================================= */
  $('btn-theater').onclick = toggleTheater;
  function toggleTheater() {
    theater = !theater;
    $('topbar').style.display = theater ? 'none' : '';
    $('tabs').style.display   = theater ? 'none' : '';
    if (theater) toast('Theater mode — Esc to exit', 'inf');
  }

  /* =============================================
     BOOKMARK THIS PAGE
  ============================================= */
  $('btn-bm').onclick = () => {
    const t = cur();
    if (!t.url) { toast('Nothing to bookmark', 'inf'); return; }
    if (bms.find(b => b.url === t.url)) { toast('Already bookmarked', 'inf'); return; }
    bms.unshift({ url: t.url, title: t.title });
    saveBms();
    renderBms();
    toast('Bookmarked!', 'ok');
  };

  /* =============================================
     ABOUT:BLANK CLOAK (FIXED)
  ============================================= */
  $('btn-cloak').onclick = () => {
    try {
      const w = window.open('about:blank', '_blank', 'noopener,noreferrer');
      if (!w) { toast('Pop-ups blocked — allow pop-ups first', 'err'); return; }
      
      // Build complete app HTML with inline styles
      const appHTML = document.documentElement.outerHTML
        .replace(/'/g, "\\'")
        .replace(/</g, '\\x3C');
      
      // Write minimal page first, then inject app after delay
      w.document.open();
      w.document.write(`<!DOCTYPE html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crown Browser</title>
<style>*{margin:0;padding:0}body,html{height:100%;overflow:hidden;background:#06060f;color:#dde8f0;font-family:Nunito,sans-serif}</style>
</head><body><div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px"><div style="width:40px;height:40px;border:2px solid rgba(0,240,210,0.13);border-top-color:#00f0d2;border-radius:50%;animation:spin .7s linear infinite"></div><div style="color:#00f0d2;font-size:16px">🔒 Loading Crown Browser...</div></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style><script>setTimeout(function(){try{document.open();document.write('${appHTML}');document.close();}catch(e){document.body.innerHTML='<h2 style="color:#ef4444;text-align:center;margin-top:20%">Cloak failed: '+e.message+'</h2>'}},350);<\/script></body></html>`);
      w.document.close();
      
      toast('Cloaked tab opened ✓', 'ok');
      
      // Close original window after delay
      setTimeout(() => { try { window.close(); } catch(e) {} }, 800);
      
    } catch (e) {
      toast('Cloak failed: ' + e.message, 'err');
    }
  };

  /* =============================================
     ERROR ACTIONS
  ============================================= */
  $('btn-retry').onclick = () => {
    proxyOn = true;
    $('btn-proxy').classList.add('on');
    const t = cur();
    if (t.url) load(t.url);
  };
  $('btn-ext').onclick = () => {
    const t = cur();
    if (t.url) window.open(t.url, '_blank', 'noopener');
  };

  /* =============================================
     SIDEBAR
  ============================================= */
  $('btn-sb').onclick   = () => { sidebar.classList.add('open'); renderSidebar(); };
  $('sb-close').onclick = () => sidebar.classList.remove('open');

  document.querySelectorAll('.sb-tab').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.sb-tab').forEach(b => b.classList.remove('act'));
      document.querySelectorAll('.sb-pane').forEach(p => p.classList.remove('act'));
      btn.classList.add('act');
      $('pane-' + btn.dataset.p).classList.add('act');
      renderSidebar();
    };
  });

  function renderSidebar() { renderHist(); renderBms(); }

  function renderHist() {
    const el = $('pane-hist');
    if (!hist.length) { el.innerHTML = '<div class="empty">No history yet.</div>'; return; }
    el.innerHTML = hist.slice(0, 60).map((h, i) => `
      <div class="si">
        <div class="si-ttl">${esc(h.title)}</div>
        <div class="si-url">${esc(h.url)}</div>
        <div class="si-row">
          <button class="sm" onclick="nav('${escA(h.url)}');document.getElementById('sidebar').classList.remove('open')">Visit</button>
          <button class="sm" onclick="delHist(${i})">✕</button>
        </div>
      </div>`).join('');
  }
  window.delHist = i => {
    hist.splice(i, 1);
    saveHist();
    renderHist();
  };

  function renderBms() {
    const el = $('bm-list');
    if (!bms.length) { el.innerHTML = '<div class="empty">No bookmarks yet.</div>'; return; }
    el.innerHTML = bms.map((b, i) => `
      <div class="si">
        <div class="si-ttl">${esc(b.title)}</div>
        <div class="si-url">${esc(b.url)}</div>
        <div class="si-row">
          <button class="sm" onclick="nav('${escA(b.url)}');document.getElementById('sidebar').classList.remove('open')">Visit</button>
          <button class="sm" onclick="delBm(${i})">✕</button>
        </div>
      </div>`).join('');
  }
  $('do-bm').onclick = $('btn-bm').onclick;
  window.delBm = i => {
    bms.splice(i, 1);
    saveBms();
    renderBms();
  };

  /* =============================================
     PERSIST
  ============================================= */
  function addHist(url) {
    const title = host(url);
    hist = hist.filter(h => h.url !== url);
    hist.unshift({ url, title });
    if (hist.length > 100) hist.length = 100;
    saveHist();
  }
  function saveHist() { try { localStorage.setItem('cr_hist', JSON.stringify(hist)); } catch {} }
  function saveBms()  { try { localStorage.setItem('cr_bm',   JSON.stringify(bms));  } catch {} }

  /* =============================================
     KEYBOARD SHORTCUTS
  ============================================= */
  document.addEventListener('keydown', e => {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || e.target.isContentEditable) return;
    if (e.key === 'Escape') {
      if (theater) toggleTheater();
      sidebar.classList.remove('open');
    }
    if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
      e.preventDefault(); $('btn-rl').click();
    }
    if (e.key === 'F11') { e.preventDefault(); toggleTheater(); }
    if (e.ctrlKey && e.key === 't') { e.preventDefault(); newTab(); }
    if (e.ctrlKey && e.key === 'w') { e.preventDefault(); closeTab(act); }
    if (e.altKey && e.key === 'ArrowLeft')  $('btn-back').click();
    if (e.altKey && e.key === 'ArrowRight') $('btn-fwd').click();
    if (e.key === 'F6') { e.preventDefault(); urlBar.select(); }
  });

  /* =============================================
     TOAST
  ============================================= */
  let ttimer;
  function toast(msg, type = 'inf') {
    toastEl.textContent = msg;
    toastEl.className = `show ${type}`;
    clearTimeout(ttimer);
    ttimer = setTimeout(() => { toastEl.className = ''; }, 2700);
  }
  window.toast = toast;

})();
</script>
</body>
</html>
