<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crown Nexus: Browser</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #05050a;
            --bg2: #0c0c1e;
            --panel: rgba(12, 12, 30, 0.98);
            --border: rgba(0, 180, 255, 0.15);
            --cyan: #00d2ff;
            --text: #e0efff;
            --dim: rgba(224, 239, 255, 0.45);
            --topH: 48px;
            --tabH: 34px;
            --r: 8px;
        }
        html,
        body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }
        #boot {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .b-logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--cyan);
            text-shadow: 0 0 60px var(--cyan);
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow {
            0%,
            100% {
                text-shadow: 0 0 40px var(--cyan);
            }
            50% {
                text-shadow: 0 0 80px var(--cyan);
            }
        }
        .b-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            transition: width 0.8s cubic-bezier(.4, 0, .2, 1);
        }
        #app {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        #app.on {
            display: flex;
        }
        #topbar {
            height: var(--topH);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(30px);
        }
        #url {
            width: 100%;
            height: 34px;
            padding: 0 36px 0 12px;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid var(--border);
            border-radius: var(--r);
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            outline: none;
        }
        #url:focus {
            border-color: var(--cyan);
        }
        #viewport {
            flex: 1;
            position: relative;
            background: var(--bg);
        }
        #viewport .tab-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: #fff;
        }
        #viewport .tab-iframe.active {
            display: block;
        }
        .newtab {
            width: 28px;
            height: 28px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--dim);
            cursor: pointer;
            transition: .1s;
        }
        .newtab:hover {
            background: var(--cyan);
            color: #000;
        }
        .tab {
            height: 26px;
            min-width: 60px;
            max-width: 140px;
            padding: 0 8px;
            border: 1px solid transparent;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.02);
            color: var(--dim);
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: .1s;
        }
        .tab.act {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0, 210, 255, 0.08);
        }
        #tabs {
            display: flex;
            gap: 2px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }
        #tabs::-webkit-scrollbar {
            height: 2px;
            background: var(--bg);
        }
        #tabs::-webkit-scrollbar-thumb {
            background: var(--cyan);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="boot">
        <div class="b-logo">CROWN NEXUS</div>
        <div class="b-track"><div class="b-fill" id="bfill"></div></div>
    </div>
    <div id="app">
        <div id="topbar">
            <button class="newtab" id="btn-newtab">+</button>
            <button class="ico" id="btn-back" disabled>&#8592;</button>
            <button class="ico" id="btn-fwd" disabled>&#8594;</button>
            <button class="ico" id="btn-rl">&#8635;</button>
            <input id="url" placeholder="Search or URL..." autofocus />
            <button class="ico" id="btn-proxy">&#128269;</button>
        </div>
        <div id="tabs"></div>
        <div id="viewport"></div>
    </div>
    <script>
        // ===== CONFIG (CHANGE THIS TO YOUR DEPLOYED PROXY URL) =====
        const PROXY_BACKEND = 'https://your-proxy-server.onrender.com/proxy?url=';

        // ===== BROWSER ENGINE =====
        let tabs = [];
        let act = 0;
        let tid = 1;
        let hist = [];
        let proxyOn = true;

        const $ = id => document.getElementById(id);
        const viewport = $('viewport');
        const urlBar = $('url');
        const tabsEl = $('tabs');

        function mk(title, url) {
            return { id: tid++, title: title || 'New Tab', url: url || '', iframe: null };
        }

        function cur() { return tabs[act]; }

        function norm(input) {
            let raw = input.trim();
            if (!raw) return '';
            if (/^https?:\/\//i.test(raw)) return raw;
            if (/^[a-z0-9-]+(\.[a-z]{2,})+/i.test(raw)) return 'https://' + raw;
            return `https://www.google.com/search?q=${encodeURIComponent(raw)}`;
        }

        function newTab(url) {
            tabs.push(mk('New Tab', url));
            act = tabs.length - 1;
            render();
            const t = cur();
            t.iframe = document.createElement('iframe');
            t.iframe.className = 'tab-iframe';
            t.iframe.sandbox = 'allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation-by-user-activation';
            t.iframe.style.width = '100%';
            t.iframe.style.height = '100%';
            viewport.appendChild(t.iframe);
            if (url) navigate(t, url);
            else showHome(t);
            urlBar.value = t.url;
        }
        $('btn-newtab').onclick = () => newTab();

        function navigate(tab, input) {
            const finalUrl = norm(input);
            if (!finalUrl) return;
            tab.url = finalUrl;
            tab.title = new URL(finalUrl).hostname.replace(/^www\./, '') || 'New Tab';
            let src = finalUrl;
            if (proxyOn) {
                src = PROXY_BACKEND + encodeURIComponent(finalUrl);
            }
            tab.iframe.src = src;
            urlBar.value = finalUrl;
            render();
            addHist(finalUrl);
        }

        function showHome(tab) {
            tab.iframe.srcdoc = `<html><body style='background:#0c0c1e;color:#e0efff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;font-size:2rem;letter-spacing:4px;'>CROWN NEXUS</body></html>`;
        }

        function switchTab(idx) {
            if (idx === act) return;
            document.querySelectorAll('#viewport .tab-iframe').forEach(el => el.classList.remove('active'));
            act = idx;
            tabs[act].iframe.classList.add('active');
            urlBar.value = tabs[act].url;
            render();
        }

        function closeTab(idx) {
            if (tabs.length <= 1) return;
            const t = tabs[idx];
            if (t.iframe) t.iframe.remove();
            tabs.splice(idx, 1);
            if (act === idx) act = Math.min(idx, tabs.length - 1);
            else if (act > idx) act--;
            document.querySelectorAll('#viewport .tab-iframe').forEach(el => el.classList.remove('active'));
            tabs[act].iframe.classList.add('active');
            urlBar.value = tabs[act].url;
            render();
        }

        function render() {
            tabsEl.innerHTML = '';
            tabs.forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'tab' + (i === act ? ' act' : '');
                div.textContent = t.title;
                div.onclick = () => switchTab(i);
                const x = document.createElement('span');
                x.textContent = ' ✕';
                x.style.color = 'var(--dim)';
                x.style.cursor = 'pointer';
                x.onclick = (e) => { e.stopPropagation();
                    closeTab(i); };
                div.appendChild(x);
                tabsEl.appendChild(div);
            });
        }

        function addHist(url) {
            hist = hist.filter(h => h !== url);
            hist.unshift(url);
            if (hist.length > 50) hist.length = 50;
        }

        // ===== CONTROLS =====
        urlBar.addEventListener('keydown', e => {
            if (e.key === 'Enter') navigate(cur(), urlBar.value);
        });

        $('btn-back').onclick = () => { const t = cur(); if (t.iframe) t.iframe.contentWindow.history.back(); };
        $('btn-fwd').onclick = () => { const t = cur(); if (t.iframe) t.iframe.contentWindow.history.forward(); };
        $('btn-rl').onclick = () => { const t = cur(); if (t.url) navigate(t, t.url); };

        $('btn-proxy').onclick = () => {
            proxyOn = !proxyOn;
            const t = cur();
            if (t.url) navigate(t, t.url);
        };

        // ===== BOOT =====
        let progress = 0;
        const interval = setInterval(() => {
            progress += 5;
            document.getElementById('bfill').style.width = progress + '%';
            if (progress >= 100) {
                clearInterval(interval);
                document.getElementById('boot').style.display = 'none';
                document.getElementById('app').classList.add('on');
                newTab();
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('./sw.js');
                }
            }
        }, 30);
    </script>
</body>
</html>
